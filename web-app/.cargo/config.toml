[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]

# sqlite-wasm-rs's build script (via the `cc` crate) needs a C compiler
# that can target wasm32 -- see wasm-cc.sh's doc comment for why this is a
# wrapper rather than pointing straight at `clang`.
[env]
CC_wasm32_unknown_unknown = { value = ".cargo/wasm-cc.sh", relative = true }
AR_wasm32_unknown_unknown = { value = ".cargo/wasm-ar.sh", relative = true }
